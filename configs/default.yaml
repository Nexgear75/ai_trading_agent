# ============================================================================
# AI Trading Pipeline — Configuration par défaut (MVP)
# Référence : docs/specifications/Specification_Pipeline_Commun_AI_Trading_v1.0.md
# Version  : 1.1 (addendum inclus)
# ============================================================================

# --- Dataset -----------------------------------------------------------------
dataset:
  exchange: binance
  symbols:
    - BTCUSDT                     # MVP : un seul symbole par run
  timeframe: "1h"                 # Intervalle entre bougies (Δ)
  start: "2024-01-01"             # Date début (UTC, incluse)
  end: "2026-01-01"               # Date fin (UTC, exclue)
  timezone: UTC
  raw_dir: data/raw               # Répertoire des fichiers bruts

# --- Label (cible y_t) ------------------------------------------------------
label:
  horizon_H_bars: 4               # Horizon de prédiction (bougies)
  target_type: log_return_trade   # log_return_trade | log_return_close_to_close

# --- Window (entrée modèle) -------------------------------------------------
window:
  L: 128                          # Longueur fenêtre d'entrée (pas de temps)
  min_warmup: 200                 # Bougies ignorées en début de série

# --- Features ----------------------------------------------------------------
features:
  feature_version: mvp_v1
  feature_list:
    - logret_1
    - logret_2
    - logret_4
    - vol_24
    - vol_72
    - logvol
    - dlogvol
    - rsi_14
    - ema_ratio_12_26
  # Paramètres des features individuelles
  # NOTE : Ces paramètres sont des extensions implementation-defined non listées
  # dans l'Annexe E.1 de la spec (qui les définit comme constantes dans les
  # formules §6.3–§6.5). Ils sont exposés ici en config pour éviter tout
  # hardcoding et garantir l'explicitation des choix (cf. convention du plan).
  params:
    rsi_period: 14
    rsi_epsilon: 1.0e-12
    ema_fast: 12
    ema_slow: 26
    vol_windows:
      - 24
      - 72
    logvol_epsilon: 1.0e-8
    volatility_ddof: 0            # Population std (ddof=0)

# --- Splits (walk-forward) --------------------------------------------------
splits:
  scheme: walk_forward_rolling
  train_days: 180
  test_days: 30
  step_days: 30                   # Glissement entre folds
  val_frac_in_train: 0.2          # Fraction temporelle finale du train → validation
  embargo_bars: 4                 # = H par défaut. Gap entre train/val et test.

# --- Scaling / normalisation -------------------------------------------------
scaling:
  method: standard                # standard | robust (rolling_zscore : non implémenté dans le MVP)
  epsilon: 1.0e-12
  # Options pour 'robust' (si activé) :
  robust_quantile_low: 0.005
  robust_quantile_high: 0.995
  # Options pour 'rolling_zscore' (non MVP) :
  rolling_window: 720             # Fenêtre passée pour z-score causal

# --- Strategy ----------------------------------------------------------------
# Remplacer ce bloc par la stratégie à évaluer.
strategy:
  strategy_type: model            # model | baseline
  name: xgboost_reg              # xgboost_reg | cnn1d_reg | gru_reg | lstm_reg | patchtst_reg | rl_ppo | no_trade | buy_hold | sma_rule
  framework: xgboost

# --- Thresholding (calibration θ) -------------------------------------------
thresholding:
  method: quantile_grid           # quantile_grid | fixed_value | none
  q_grid:
    - 0.5
    - 0.6
    - 0.7
    - 0.8
    - 0.9
    - 0.95
  objective: max_net_pnl_with_mdd_cap
  mdd_cap: 0.25                  # Max drawdown toléré
  min_trades: 20                  # Nombre min de trades pour valider un θ

# --- Costs (backtest) -------------------------------------------------------
costs:
  cost_model: per_side_multiplicative
  fee_rate_per_side: 0.0005       # 0.05% (taker Binance)
  slippage_rate_per_side: 0.00025 # 0.025%

# --- Backtest ----------------------------------------------------------------
# NOTE : Les valeurs ci-dessous sont imposées par la spec (§12.1, E.2.3).
# La validation de config (WS-1.3) lève une erreur si elles sont modifiées.
backtest:
  mode: one_at_a_time             # IMPOSÉ MVP — un seul trade actif à la fois
  direction: long_only            # IMPOSÉ MVP — pas de short
  initial_equity: 1.0             # Normalisé
  position_fraction: 1.0          # All-in (w=1), pas de levier

# --- Baselines ---------------------------------------------------------------
baselines:
  sma:
    fast: 20
    slow: 50

# --- Training (modèles ML/DL) -----------------------------------------------
# NOTE : loss, optimizer ci-dessous sont des extensions implementation-defined
# non couvertes par l'Annexe E.1 de la spec (qui fixe uniquement les defaults).
# Valeurs additionnelles autorisées : loss = mae | huber ; optimizer = sgd | adamw.
training:
  loss: mse                       # mse | mae | huber  (extension impl-defined)
  optimizer: adam                  # adam | sgd | adamw  (extension impl-defined)
  learning_rate: 1.0e-3
  batch_size: 64
  max_epochs: 100
  early_stopping_patience: 10     # Epochs (DL) ou rounds (XGBoost)

# --- Hyperparamètres par modèle ----------------------------------------------
# NOTE : Certains hyperparamètres ci-dessous (subsample, colsample_bytree,
# reg_alpha, reg_lambda, value_loss_coeff) sont des extensions implementation-
# defined non listées dans l'Annexe E.1 de la spec. Ils sont documentés ici
# pour expliciter les choix d'implémentation (cf. spec Annexe E.2, « tout
# choix implementation-defined est explicite dans la config YAML »).
models:
  xgboost:
    max_depth: 5
    n_estimators: 500
    learning_rate: 0.05           # XGBoost-specific LR (pas le training.learning_rate)
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0

  cnn1d:
    n_conv_layers: 2
    filters: 64
    kernel_size: 3
    dropout: 0.2
    pool: global_avg              # global_avg | global_max

  gru:
    hidden_size: 64
    num_layers: 1
    bidirectional: false
    dropout: 0.2

  lstm:
    hidden_size: 64
    num_layers: 1
    bidirectional: false
    dropout: 0.2

  patchtst:
    patch_size: 16
    stride: 8
    d_model: 64
    n_heads: 4
    n_layers: 2
    ff_dim: 128
    dropout: 0.2

  rl_ppo:
    hidden_sizes:
      - 64
      - 64
    clip_epsilon: 0.2             # PPO clipping
    gamma: 0.99                   # Discount factor
    gae_lambda: 0.95              # GAE lambda
    n_epochs_ppo: 4               # PPO inner epochs per rollout
    max_episodes: 200             # Max training episodes (rollouts)
    rollout_steps: 512            # Steps per rollout
    value_loss_coeff: 0.5
    entropy_coeff: 0.01           # Exploration encouragement
    learning_rate: 3.0e-4         # PPO-specific LR
    deterministic_eval: true      # argmax at test time

# --- Metrics -----------------------------------------------------------------
metrics:
  sharpe_annualized: false        # Non annualisé dans le MVP
  sharpe_epsilon: 1.0e-12

# --- Reproductibilité -------------------------------------------------------
reproducibility:
  global_seed: 42
  deterministic_torch: true       # torch.use_deterministic_algorithms(True)

# --- Artefacts ---------------------------------------------------------------
artifacts:
  output_dir: runs                # Racine des runs
  save_model: true                # Sauvegarder les artefacts modèle par fold
  save_equity_curve: true
  save_predictions: true          # preds_val.csv + preds_test.csv
