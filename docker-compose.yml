services:
  trading-bot:
    build: .
    container_name: ai-trading-bot
    env_file:
      - .env
    volumes:
      # Persist trading state (positions, capital) across restarts
      - ./testing:/app/testing
      # Mount models so you can swap checkpoints without rebuilding
      - ./models:/app/models
      # Persistent logs on host (optional, in addition to docker logs)
      - ./logs:/app/logs
    command: >
      python -m testing.realtime_testing
      --symbol LINK/USDT
      --model cnn_bilstm_am
      --rrr 2.0
      --capital 1000
      --timeframe 1h
      --threshold 0.015
      --sizing-mode dynamic
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
